version: '3.8'

# TravelAgents v3.0 Docker Compose配置
# 智能旅行规划系统 - 前后端分离部署

services:
  # FastAPI 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: travel-agents-backend:v3.0
    container_name: travel-agents-backend
    ports:
      - "8005:8005"
    volumes:
      # 日志目录映射
      - ./logs:/app/logs
      # 配置目录映射
      - ./config:/app/config
      # 数据目录映射
      - ./data:/app/data
    env_file:
      - .env.docker
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      TZ: "Asia/Shanghai"
      # 日志配置
      LOG_LEVEL: "INFO"
      LOG_DIR: "/app/logs"
      # Docker专用数据库配置
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: travel123
      MONGODB_DATABASE: travel_agents
      MONGODB_AUTH_SOURCE: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: travel123
      REDIS_DB: 0
      # Docker环境标识
      DOCKER_CONTAINER: "true"
      # API配置
      API_HOST: "0.0.0.0"
      API_PORT: "8005"
      # CORS配置
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4000,http://localhost:5173"
      # LLM配置（需要提供至少一个）
      # DEEPSEEK_API_KEY: "your-deepseek-key"
      # DASHSCOPE_API_KEY: "your-dashscope-key"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Vue 3 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: travel-agents-frontend:v3.0
    container_name: travel-agents-frontend
    ports:
      - "4000:80"
    environment:
      TZ: "Asia/Shanghai"
      # 后端API地址（Docker网络内使用服务名）
      VITE_API_BASE_URL: "http://backend:8005"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # MongoDB 数据库服务
  mongodb:
    image: mongo:4.4
    container_name: travel-agents-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: travel123
      MONGO_INITDB_DATABASE: travel_agents
      TZ: "Asia/Shanghai"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - travel-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: travel-agents-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: "Asia/Shanghai"
    command: redis-server --appendonly yes --requirepass travel123
    volumes:
      - redis_data:/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # Redis Commander 管理界面（可选）
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: travel-agents-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:travel123
    networks:
      - travel-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - management

  # Mongo Express 管理界面（可选）
  mongo-express:
    image: mongo-express:latest
    container_name: travel-agents-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: travel123
      ME_CONFIG_MONGODB_URL: mongodb://admin:travel123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: travel123
    networks:
      - travel-network
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - management

# 数据卷定义
volumes:
  mongodb_data:
    driver: local
    name: travel_agents_mongodb_data
  redis_data:
    driver: local
    name: travel_agents_redis_data

# 网络定义
networks:
  travel-network:
    driver: bridge
    name: travel-network
