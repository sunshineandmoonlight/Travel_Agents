  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }
    h1 { color: #0EA5E9; }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .result {
      background: #f9f9f9;
      padding: 10px;
      margin: 10px 0;
      border-left: 3px solid #10B981;
    }
    button {
      background: #0EA5E9;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;

<body>
  <h1>智能旅行内容库测试</h1>
  <p>请按 F12 打开开发者工具，然后点击下面的按钮进行测试</p>

  <div class="test-section">
    <h3>1. 测试景点数据</h3>
    <button onclick="testAttractions()">测试罗马景点</button>

    <button onclick="testDinner()">测试罗马晚餐</button>
    <div id="restaurant-result" class="result" style="display:none;"></div>
