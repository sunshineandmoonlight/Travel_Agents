<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>测试图片API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .loading { background: #fff3cd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>图片API测试工具</h1>

    <div>
        <label>景点名称：</label>
        <input type="text" id="attraction" value="圣淘沙" style="width: 200px;">

        <label>城市：</label>
        <input type="text" id="city" value="新加坡" style="width: 150px;">

        <button onclick="testSingleImage()">测试单张图片</button>
        <button onclick="testBatchImages()">测试批量图片</button>
    </div>

    <div id="results"></div>

    <script>
        const ports = [8005, 8006];

        function addResult(message, type = 'loading') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            document.getElementById('results').prepend(div);
        }

        async function testSingleImage() {
            const attraction = document.getElementById('attraction').value;
            const city = document.getElementById('city').value;

            addResult(`正在测试 ${attraction} (${city})...`, 'loading');

            for (const port of ports) {
                try {
                    const url = `http://localhost:${port}/api/travel/images/attraction?attraction_name=${encodeURIComponent(attraction)}&city=${encodeURIComponent(city)}&width=400&height=300`;

                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.url && !data.url.includes('placehold.co')) {
                        addResult(`✅ 端口 ${port} 成功: ${attraction} → ${data.url}`, 'success');
                        return;
                    } else {
                        addResult(`⚠️ 端口 ${port} 返回占位图`, 'error');
                    }
                } catch (error) {
                    addResult(`❌ 端口 ${port} 连接失败: ${error.message}`, 'error');
                }
            }
        }

        async function testBatchImages() {
            const attractions = ['圣淘沙', '滨海湾', '乌节路', '植物园', '牛车水'];
            const city = '新加坡';

            addResult(`开始批量测试 ${attractions.length} 个景点...`, 'loading');

            let successCount = 0;
            let failCount = 0;

            for (const attraction of attractions) {
                try {
                    const url = `http://localhost:8005/api/travel/images/attraction?attraction_name=${encodeURIComponent(attraction)}&city=${encodeURIComponent(city)}&width=400&height=300`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.url && !data.url.includes('placehold.co')) {
                        addResult(`✅ ${attraction}: ${data.url.substring(0, 60)}...`, 'success');
                        successCount++;
                    } else {
                        addResult(`⚠️ ${attraction}: 返回占位图`, 'error');
                        failCount++;
                    }
                } catch (error) {
                    addResult(`❌ ${attraction}: ${error.message}`, 'error');
                    failCount++;
                }
            }

            addResult(`批量测试完成: 成功 ${successCount}/${attractions.length}`, successCount === attractions.length ? 'success' : 'error');
        }
    </script>
</body>
</html>
